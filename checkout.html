<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Side Hustle Lab</title>
  <style>
    :root {
      --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24; --text: #f0f0f5; --text-dim: #8888a0;
      --accent: #7c3aed; --accent2: #a855f7; --accent-grad: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
      --accent-bg: rgba(124, 58, 237, 0.1); --border: rgba(255,255,255,0.08); --card-bg: #111118;
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --radius: 12px; --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .container { max-width: 500px; margin: 0 auto; padding: 20px; text-align: center; }
    .checkout-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px 30px; }
    h1 { font-size: 2rem; font-weight: 800; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
    p { color: var(--text-dim); margin-bottom: 10px; }
    .summary-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 1rem; }
    .summary-item .label { color: var(--text); font-weight: 600; }
    .summary-item .value { color: var(--accent2); font-weight: 600; }
    .total { border-top: 1px solid var(--border); padding-top: 15px; margin-top: 20px; display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 700; }
    .total .label { color: var(--text); }
    .total .value { background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-pay { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; background: var(--accent-grad); color: white; border-radius: var(--radius-sm); font-size: 1rem; font-weight: 700; text-decoration: none; margin-top: 30px; transition: opacity 0.2s; }
    .btn-pay:hover { opacity: 0.9; }
    .note { font-size: 0.8rem; color: var(--text-dim); margin-top: 20px; }
    .back-link { display: block; margin-top: 30px; font-size: 0.9rem; color: var(--text-dim); text-decoration: none; }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="container">
    <div class="checkout-card">
      <h1>Your Order</h1>
      <div id="orderSummary">
        <!-- Order details will be loaded here by JavaScript -->
      </div>
      <p class="note">You will be redirected to Stripe for secure payment.</p>
      <a href="#" id="payButton" class="btn-pay">Pay Now →</a>
      <a href="index.html" class="back-link">← Back to Side Hustle Lab</a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const orderSummary = document.getElementById('orderSummary');
      const payButton = document.getElementById('payButton');

      const customReportEmail = localStorage.getItem('customReportEmail');
      const customReportIdea = localStorage.getItem('customReportIdea');
      const customReportPrice = 25; // Hardcoded price for custom report

      if (customReportEmail && customReportIdea) {
        orderSummary.innerHTML = `
          <div class="summary-item"><span class="label">Product:</span><span class="value">Custom Side Hustle Report</span></div>
          <div class="summary-item"><span class="label">Your Idea:</span><span class="value">${customReportIdea}</span></div>
          <div class="summary-item"><span class="label">Email:</span><span class="value">${customReportEmail}</span></div>
          <div class="total"><span class="label">Total:</span><span class="value">$${customReportPrice}</span></div>
        `;
        payButton.href = `https://buy.stripe.com/14A7wY2LL2i44cj9AF?client_reference_id=${customReportEmail}&metadata[customerIdea]=${encodeURIComponent(customReportIdea)}`;
        payButton.target = "_blank"; // Open Stripe in a new tab
        
        // Clear localStorage after setting the link, so subsequent visits don't show the same order
        // This will be done on the thank-you page after successful payment redirect
      } else {
        orderSummary.innerHTML = '<p>No order details found. Please go back and select a report.</p>';
        payButton.style.display = 'none';
      }
    });
  </script>
</body>
</html>
